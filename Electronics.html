<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BidBay | Electronics</title>

    <link rel="stylesheet" href="electronics.css" />
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">BidPay</a>

            <div class="search-bar">
                <input type="text" placeholder="Search for anything..." />
                <button>Search</button>
            </div>

            <div class="nav-links">
                <div class="dropdown">
                    <button class="dropbutton">Pages ▾</button>
                    <div class="dropdown-content">
                        <a href="index.html">Home</a>
                        <a href="electronics.html">Electronics</a>
                        <a href="furniture.html">Furniture</a>
                        <a href="vehicles.html">Cars</a>
                    </div>
                </div>

                <a href="#">Watch List</a>
                <a href="#">My BidPay</a>
                <a href="#" class="btn-primary">Sign In</a>
            </div>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Latest Electronics & Gadgets</h1>
        <p>Bid, win and own cutting-edge tech - from smartphones to gaming gear!</p>
    </div>
</section>

<section class="featured-auctions" id="auctions">
    <div class="container">
        <h2 class="section-title">Top Electronic Auctions</h2>
        <div class="auction-grid" id="itemsContainer"></div>
    </div>
</section>

<!-- BID MODAL -->
<div id="bidModal" class="modal">
    <div class="modal-content">
        <h2>Place Your Bid</h2>
        <p id="modalItemTitle"></p>

        <input type="number" id="bidInput" placeholder="Enter bid amount" />

        <div class="modal-buttons">
            <button id="cancelBid" class="cancel-btn">Cancel</button>
            <button id="submitBid" class="submit-btn">Submit Bid</button>
        </div>
    </div>
</div>

<!-- ✅ SUCCESS TOAST -->
<div id="successToast" class="toast">
    Bid placed successfully!
</div>

<footer>
    <div class="container">
        <div class="footer-bottom">
            &copy; 2025 BidBay | All Rights Reserved
        </div>
    </div>
</footer>

<script>
const API_URL = "https://bid-bay-be.onrender.com/api/items";
let selectedItemId = null;

/* ✅ TIMER HELPER (ADDED) */
function getFakeEndTime(itemId) {
    const seed = parseInt(itemId.slice(-2), 16);
    const days = seed % 3;        // 0–2 days
    const hours = (seed * 3) % 24;

    if (days === 0) return `Ends in: ${hours + 1}h`;
    return `Ends in: ${days}d ${hours}h`;
}

async function loadItems() {
    const res = await fetch(`${API_URL}?category=electronics`);
    const items = await res.json();

    const container = document.getElementById("itemsContainer");
    container.innerHTML = "";

    items.forEach(item => {
        container.innerHTML += `
            <div class="auction-card">
                <div class="auction-image">
                    <img src="${item.image}" alt="${item.title}" />
                </div>
                <div class="auction-details">
                    <h3>${item.title}</h3>
                    <p class="auction-price">$${item.currentPrice}</p>
                    <div class="auction-info">
                        <span>${getFakeEndTime(item._id)}</span>
                        <span>${item.bids.length} bids</span>
                    </div>
                    <button class="bid-btn" data-id="${item._id}" data-title="${item.title}">
                        Place Bid
                    </button>
                </div>
            </div>
        `;
    });
}

loadItems();

/* OPEN MODAL */
document.addEventListener("click", e => {
    if (e.target.classList.contains("bid-btn")) {
        selectedItemId = e.target.dataset.id;
        document.getElementById("modalItemTitle").textContent =
            "Item: " + e.target.dataset.title;
        document.getElementById("bidInput").value = "";
        document.getElementById("bidModal").style.display = "flex";
    }
});

/* CLOSE MODAL */
document.getElementById("cancelBid").onclick = () => {
    document.getElementById("bidModal").style.display = "none";
};

/* SUBMIT BID */
document.getElementById("submitBid").onclick = async () => {
    const amount = Number(document.getElementById("bidInput").value);
    if (!amount || amount <= 0) return;

    const res = await fetch(`${API_URL}/${selectedItemId}/bid`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount })
    });

    if (res.ok) {
        showToast();
        loadItems();
    }

    document.getElementById("bidModal").style.display = "none";
};

/* SHOW TOAST */
function showToast() {
    const toast = document.getElementById("successToast");
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}
</script>

</body>
</html>
