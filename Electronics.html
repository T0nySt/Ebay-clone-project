<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BidBay | Electronics</title>

    <!-- GLOBAL + PAGE CSS -->
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="electronics.css" />
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">BidPay</a>

            <div class="search-bar">
                <input type="text" placeholder="Search for anything..." />
                <button>Search</button>
            </div>

            <div class="nav-links">
                <div class="dropdown">
                    <button class="dropbutton">Pages ▾</button>
                    <div class="dropdown-content">
                        <a href="index.html">Home</a>
                        <a href="electronics.html">Electronics</a>
                        <a href="furniture.html">Furniture</a>
                        <a href="vehicles.html">Cars</a>
                    </div>
                </div>

                <a href="#" id="sellLink">Sell</a>
                <a href="#" class="btn-primary" id="authBtn">Sign In</a>
            </div>
        </nav>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="container hero-content">
        <h1>Latest Electronics & Gadgets</h1>
        <p>Bid, win and own cutting-edge tech</p>

        <div class="hero-buttons">
            <a href="#auctions" class="btn btn-large">View Auctions</a>
            <a href="add-item.html" class="btn btn-outline">Sell Electronics</a>
        </div>
    </div>
</section>

<!-- AUCTIONS -->
<section class="featured-auctions" id="auctions">
    <div class="container">
        <h2 class="section-title">Top Electronic Auctions</h2>
        <div class="auction-grid" id="itemsContainer"></div>
    </div>
</section>

<!-- BID MODAL -->
<div id="bidModal" class="modal">
    <div class="modal-content">
        <h2>Place Your Bid</h2>
        <p id="modalItemTitle"></p>

        <input type="number" id="bidInput" placeholder="Enter bid amount" />

        <div class="modal-buttons">
            <button id="cancelBid" class="cancel-btn">Cancel</button>
            <button id="submitBid" class="submit-btn">Submit Bid</button>
        </div>
    </div>
</div>

<!-- SUCCESS TOAST -->
<div id="successToast" class="toast">Bid placed successfully!</div>

<!-- SIMPLE FOOTER (CONSISTENT) -->
<footer>
    <div class="container">
        <div class="footer-bottom">
            &copy; 2025 BidPay | All Rights Reserved
        </div>
    </div>
</footer>

<script>
/* 🔑 AUTO API SWITCH (LOCAL vs DEPLOYED) */
const API_URL = location.hostname.includes("localhost")
    ? "http://localhost:3000/api/items"
    : "https://bid-bay-be.onrender.com/api/items";

let selectedItemId = null;

/* ---------------- AUTH ---------------- */
const isLoggedIn = localStorage.getItem("isLoggedIn");
const authBtn = document.getElementById("authBtn");
const sellLink = document.getElementById("sellLink");

if (isLoggedIn === "true") {
    authBtn.textContent = "Logout";
    authBtn.onclick = () => {
        localStorage.clear();
        window.location.reload();
    };
    sellLink.href = "add-item.html";
} else {
    authBtn.textContent = "Sign In";
    authBtn.href = "signIn.html";
    sellLink.onclick = () => {
        alert("Please sign in to sell an item");
        window.location.href = "signIn.html";
    };
}

/* ---------------- TIMER ---------------- */
function getFakeEndTime(itemId) {
    const seed = parseInt(itemId.slice(-2), 16);
    const days = seed % 3;
    const hours = (seed * 3) % 24;
    return days === 0
        ? `Ends in: ${hours + 1}h`
        : `Ends in: ${days}d ${hours}h`;
}

/* ---------------- LOAD ITEMS ---------------- */
async function loadItems() {
    const res = await fetch(`${API_URL}?category=electronics`, {
        cache: "no-store"
    });
    const items = await res.json();

    const container = document.getElementById("itemsContainer");
    container.innerHTML = "";

    items.forEach(item => {
        const latestPrice =
            item.bids.length > 0
                ? item.bids[item.bids.length - 1].amount
                : item.currentPrice;

        container.innerHTML += `
            <div class="auction-card">
                <div class="auction-image">
                    <img src="${item.image}" alt="${item.title}" />
                </div>
                <div class="auction-details">
                    <h3>${item.title}</h3>
                    <p class="auction-price">$${latestPrice}</p>
                    <div class="auction-info">
                        <span>${getFakeEndTime(item._id)}</span>
                        <span>${item.bids.length} bids</span>
                    </div>
                    <button class="bid-btn"
                        data-id="${item._id}"
                        data-title="${item.title}">
                        Place Bid
                    </button>
                </div>
            </div>
        `;
    });
}

loadItems();

/* ---------------- BID HANDLING ---------------- */
document.addEventListener("click", e => {
    if (!e.target.classList.contains("bid-btn")) return;

    if (localStorage.getItem("isLoggedIn") !== "true") {
        alert("Please sign in to place a bid");
        window.location.href = "signIn.html";
        return;
    }

    selectedItemId = e.target.dataset.id;
    document.getElementById("modalItemTitle").textContent =
        "Item: " + e.target.dataset.title;
    document.getElementById("bidInput").value = "";
    document.getElementById("bidModal").style.display = "flex";
});

document.getElementById("cancelBid").onclick = () => {
    document.getElementById("bidModal").style.display = "none";
};

document.getElementById("submitBid").onclick = async () => {
    const amount = Number(document.getElementById("bidInput").value);
    if (!amount || amount <= 0) return;

    const res = await fetch(`${API_URL}/${selectedItemId}/bid`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount })
    });

    if (res.ok) {
        showToast();
        await loadItems();
    }

    document.getElementById("bidModal").style.display = "none";
};

function showToast() {
    const toast = document.getElementById("successToast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}
</script>

</body>
</html>
