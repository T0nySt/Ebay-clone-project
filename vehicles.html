<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BidPay | Vehicles</title>

  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="vehicles.css" />
</head>

<body>

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">BidPay</a>

      <div class="search-bar">
        <input type="text" placeholder="Search for anything..." />
        <button>Search</button>
      </div>

      <div class="nav-links">
        <div class="dropdown">
          <button class="dropbutton">Pages ▾</button>
          <div class="dropdown-content">
            <a href="index.html">Home</a>
            <a href="electronics.html">Electronics</a>
            <a href="furniture.html">Furniture</a>
            <a href="vehicles.html">Cars</a>
          </div>
        </div>

        <a href="#" id="sellLink">Sell</a>
        <a href="#" class="btn-primary" id="authBtn">Sign In</a>
      </div>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container hero-content">
    <h1>Top Vehicle Auctions</h1>
    <p>Bid on cars, trucks, and motorcycles</p>

    <div class="hero-buttons">
      <a href="#auctions" class="btn btn-large">View Auctions</a>
      <a href="#" class="btn btn-outline" id="sellHeroBtn">Sell Vehicles</a>
    </div>
  </div>
</section>

<section class="featured-auctions">
  <div class="container">
    <h2 class="section-title">Available Vehicles</h2>
    <div id="vehicleGrid" class="auction-grid"></div>
  </div>
</section>

<div id="bidModal" class="modal">
  <div class="modal-content">
    <h2>Place Your Bid</h2>
    <p id="modalItemTitle"></p>
    <input type="number" id="bidInput" placeholder="Enter bid amount" />
    <div class="modal-buttons">
      <button id="cancelBid" class="cancel-btn">Cancel</button>
      <button id="submitBid" class="submit-btn">Submit Bid</button>
    </div>
  </div>
</div>

<div id="successToast" class="toast">Bid placed successfully!</div>

<footer>
  <div class="container">
    <div class="footer-bottom">
      &copy; 2025 BidPay | All Rights Reserved
    </div>
  </div>
</footer>

<script>
/* 🔑 AUTO API SWITCH */
const API_URL = location.hostname.includes("localhost")
  ? "http://localhost:3000/api/items"
  : "https://bid-bay-be.onrender.com/api/items";

let selectedItemId = null;

/* ---------------- AUTH ---------------- */
const authBtn = document.getElementById("authBtn");
const sellLink = document.getElementById("sellLink");
const sellHeroBtn = document.getElementById("sellHeroBtn");
const isLoggedIn = localStorage.getItem("isLoggedIn");

if (isLoggedIn === "true") {
  authBtn.textContent = "Logout";
  authBtn.onclick = () => {
    localStorage.clear();
    window.location.reload();
  };
  sellLink.href = sellHeroBtn.href = "add-item.html";
} else {
  authBtn.textContent = "Sign In";
  authBtn.href = "signIn.html";
  sellLink.onclick = sellHeroBtn.onclick = () => {
    alert("Please sign in to sell an item");
    window.location.href = "signIn.html";
  };
}

/* ---------------- TIMER ---------------- */
function getFakeEndTime(itemId) {
  const seed = parseInt(itemId.slice(-2), 16);
  const days = seed % 4;
  const hours = (seed * 5) % 24;
  return days === 0 ? `Ends in: ${hours + 2}h` : `Ends in: ${days}d ${hours}h`;
}

/* ---------------- LOAD VEHICLES ---------------- */
async function loadVehicles() {
  const res = await fetch(`${API_URL}?category=vehicles`, { cache: "no-store" });
  const items = await res.json();

  const grid = document.getElementById("vehicleGrid");
  grid.innerHTML = "";

  items.forEach(item => {
    const price =
      item.bids.length > 0
        ? item.bids[item.bids.length - 1].amount
        : item.currentPrice;

    grid.innerHTML += `
      <div class="auction-card">
        <div class="auction-image">
          <img src="${item.image}" alt="${item.title}">
        </div>
        <div class="auction-details">
          <h3>${item.title}</h3>
          <p class="auction-price">$${price}</p>
          <div class="auction-info">
            <span>${getFakeEndTime(item._id)}</span>
            <span>${item.bids.length} bids</span>
          </div>
          <button class="bid-btn"
            data-id="${item._id}"
            data-title="${item.title}">
            Place Bid
          </button>
        </div>
      </div>
    `;
  });
}

loadVehicles();

/* ---------------- BID HANDLING ---------------- */
document.addEventListener("click", async e => {
  if (!e.target.classList.contains("bid-btn")) return;

  if (localStorage.getItem("isLoggedIn") !== "true") {
    alert("Please sign in to place a bid");
    window.location.href = "signIn.html";
    return;
  }

  selectedItemId = e.target.dataset.id;
  document.getElementById("modalItemTitle").innerText =
    "Item: " + e.target.dataset.title;
  document.getElementById("bidInput").value = "";
  document.getElementById("bidModal").style.display = "flex";
});

document.getElementById("cancelBid").onclick = () => {
  document.getElementById("bidModal").style.display = "none";
};

document.getElementById("submitBid").onclick = async () => {
  const amount = Number(document.getElementById("bidInput").value);
  if (!amount || amount <= 0) return;

  const res = await fetch(`${API_URL}/${selectedItemId}/bid`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  if (res.ok) {
    const toast = document.getElementById("successToast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
    await loadVehicles();
  }

  document.getElementById("bidModal").style.display = "none";
};
</script>

</body>
</html>
