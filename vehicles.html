<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BidPay | Vehicles</title>

  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="vehicles.css?v=5" />
</head>

<body>

<!-- HEADER -->
<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">BidPay</a>

      <div class="search-bar">
        <input type="text" placeholder="Search for anything..." />
        <button>Search</button>
      </div>

      <div class="nav-links">
        <div class="dropdown">
          <button class="dropbutton">Pages ▾</button>
          <div class="dropdown-content">
            <a href="index.html">Home</a>
            <a href="Electronics.html">Electronics</a>
            <a href="Furniture.html">Furniture</a>
            <a href="vehicles.html">Cars</a>
          </div>
        </div>
        <a href="#">Watch List</a>
        <a href="#">My BidPay</a>
        <a href="#" class="btn-primary">Sign In</a>
      </div>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Top Vehicle Auctions</h1>
    <p>Bid on cars, trucks, and motorcycles</p>
  </div>
</section>

<!-- AUCTIONS -->
<section class="featured-auctions">
  <div class="container">
    <h2 class="section-title">Available Vehicles</h2>
    <div id="vehicleGrid" class="auction-grid"></div>
  </div>
</section>

<!-- BID MODAL -->
<div id="bidModal" class="modal">
  <div class="modal-content">
    <h2>Place Your Bid</h2>
    <p id="modalItemTitle"></p>
    <input type="number" id="bidInput" placeholder="Enter bid amount" />
    <div class="modal-buttons">
      <button id="cancelBid" class="cancel-btn">Cancel</button>
      <button id="submitBid" class="submit-btn">Submit Bid</button>
    </div>
  </div>
</div>

<!-- SUCCESS TOAST -->
<div id="successToast" class="toast">Bid placed successfully!</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-bottom">
      © 2025 BidPay. All Rights Reserved.
    </div>
  </div>
</footer>

<script>
const API_URL = "https://bid-bay-be.onrender.com/api/items";
let selectedItemId = null;

/* ✅ TIMER HELPER (ADDED) */
function getFakeEndTime(itemId) {
  const seed = parseInt(itemId.slice(-2), 16);
  const days = seed % 4;        // 0–3 days
  const hours = (seed * 5) % 24;

  if (days === 0) return `Ends in: ${hours + 2}h`;
  return `Ends in: ${days}d ${hours}h`;
}

/* LOAD VEHICLES */
async function loadVehicles() {
  const res = await fetch(`${API_URL}?category=vehicles`);
  const items = await res.json();

  const grid = document.getElementById("vehicleGrid");
  grid.innerHTML = "";

  items.forEach(item => {
    grid.innerHTML += `
      <div class="auction-card">
        <div class="auction-image">
          <img src="${item.image}" alt="${item.title}">
        </div>

        <div class="auction-details">
          <h3>${item.title}</h3>
          <p class="auction-price">$${item.latestBid ?? item.currentPrice}</p>

          <div class="auction-info">
            <span>${getFakeEndTime(item._id)}</span>
            <span>${item.bids.length} bids</span>
          </div>

          <button class="bid-btn"
            data-id="${item._id}"
            data-title="${item.title}">
            Place Bid
          </button>
        </div>
      </div>
    `;
  });
}

loadVehicles();

/* OPEN MODAL */
document.addEventListener("click", e => {
  if (e.target.classList.contains("bid-btn")) {
    selectedItemId = e.target.dataset.id;
    document.getElementById("modalItemTitle").innerText =
      "Item: " + e.target.dataset.title;
    document.getElementById("bidInput").value = "";
    document.getElementById("bidModal").style.display = "flex";
  }
});

/* CLOSE MODAL */
document.getElementById("cancelBid").onclick = () => {
  document.getElementById("bidModal").style.display = "none";
};

/* SUBMIT BID */
document.getElementById("submitBid").onclick = async () => {
  const amount = Number(document.getElementById("bidInput").value);
  if (!amount || amount <= 0) return;

  await fetch(`${API_URL}/${selectedItemId}/bid`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });

  document.getElementById("bidModal").style.display = "none";

  const toast = document.getElementById("successToast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);

  loadVehicles();
};
</script>

</body>
</html>
